name: restaurant_app
description: "A production-grade restaurant app built with Flutter + GetX + Clean Architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  get: ^4.6.6

  # Fonts
  google_fonts: ^6.2.1

  # Image loading
  cached_network_image: ^3.4.1

  # Carousel
  carousel_slider: ^5.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
